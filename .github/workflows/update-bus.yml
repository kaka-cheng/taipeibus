name: Update Bus ETA

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch bus JSON
        run: curl -L "https://pda5284.gov.taipei/MQS/StopLocationDyna?stoplocationid=6732" -o data.json

      - name: Parse and build bus.json
        run: |
          python3 << 'PY'
          import json
          from pathlib import Path
          from datetime import datetime

          raw = Path("data.json").read_text(encoding="utf-8", errors="ignore")
          data = json.loads(raw)

          result = {
              "route": "257",
              "dest": "往新莊聯合辦公大樓",
              "eta": "未提供",
              "updated_at": datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          }

          # 257 / 成福路口 / 返程 / sid=11015
          TARGET_STOP_ID = "11015"

          for stop in data.get("Stop", []):
              n1 = stop.get("n1")
              if not n1:
                  continue

              arr = n1.split(",")
              if len(arr) < 8:
                  continue

              # arr[1] = stop id
              # arr[7] = ETA (秒 or 特殊碼)
              if arr[1] == TARGET_STOP_ID:
                  eta_raw = arr[7].strip()

                  if eta_raw == "0":
                      eta = "進站中"
                  elif eta_raw == "-1":
                      eta = "未發車"
                  elif eta_raw == "-2":
                      eta = "交管不停"
                  elif eta_raw == "-3":
                      eta = "末班已過"
                  elif eta_raw == "-4":
                      eta = "今日未營運"
                  else:
                      try:
                          sec = int(eta_raw)
                          eta = "將到站" if 0 < sec < 180 else f"{sec // 60}分"
                      except:
                          eta = "未提供"

                  result["eta"] = eta
                  break

          if data.get("UpdateTime"):
              ts = data["UpdateTime"]
              ts = ts.replace("T", " ")
              ts = ts.replace("&#x3a;", ":")
              ts = ts.replace("&nbsp;", " ")
              result["updated_at"] = ts[:19]

          Path("bus.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          PY

      - name: Commit bus.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bus.json
          git diff --cached --quiet || git commit -m "update bus eta"
          git push
