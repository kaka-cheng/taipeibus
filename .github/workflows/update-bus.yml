name: Update Bus ETA

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch bus page
        run: curl -L "https://pda5284.gov.taipei/MQS/stoplocation.jsp?slid=6732" -o page.html

      - name: Install parser
        run: pip install beautifulsoup4

      - name: Parse and build bus.json
        run: |
          python3 << 'PY'
          import json
          import re
          from pathlib import Path
          from datetime import datetime
          from bs4 import BeautifulSoup

          html = Path("page.html").read_text(encoding="utf-8", errors="ignore")
          soup = BeautifulSoup(html, "html.parser")

          text = soup.get_text(" ", strip=True).replace("\xa0", " ")
          print(text)

          result = {
              "route": "257",
              "dest": "往新莊聯合辦公大樓",
              "eta": "未提供",
              "updated_at": datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          }

          match = re.search(r"257\s+成福路口\s+返程\s+([^\s]+)", text)

          if match:
              result["eta"] = match.group(1)

          Path("bus.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          PY

      - name: Commit bus.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bus.json
          git diff --cached --quiet || git commit -m "update bus eta"
          git push
