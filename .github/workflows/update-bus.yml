name: Update Bus ETA

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch bus page
        run: curl -L "https://pda5284.gov.taipei/MQS/stoplocation.jsp?slid=6732" -o page.html

      - name: Parse and build bus.json
        run: |
          python3 << 'PY'
          import re, json
          from pathlib import Path
          from datetime import datetime

          html = Path("page.html").read_text(encoding="utf-8", errors="ignore")

          rows = re.findall(r"<tr.*?>(.*?)</tr>", html, re.S)
          result = None

          for row in rows:
              cols = re.findall(r"<td.*?>(.*?)</td>", row, re.S)
              cols = [re.sub(r"<.*?>", "", c).strip() for c in cols]

              if len(cols) < 4:
                  continue

              route, stop, direction, eta = cols[:4]

              if route == "257" and stop == "成福路口" and direction == "返程":
                  result = {
                      "route": "257",
                      "dest": "往新莊聯合辦公大樓",
                      "eta": eta if eta else "未提供",
                      "updated_at": datetime.now().strftime("%Y-%m-%d %H:%M:%S")
                  }
                  break

          if result is None:
              result = {
                  "route": "257",
                  "dest": "往新莊聯合辦公大樓",
                  "eta": "未提供",
                  "updated_at": datetime.now().strftime("%Y-%m-%d %H:%M:%S")
              }

          Path("bus.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          PY

      - name: Commit bus.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bus.json
          git diff --cached --quiet || git commit -m "update bus eta"
          git push
