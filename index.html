<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f8fafc" />
  <title>成福路口（去程）公車到站板</title>
  <style>
    :root{--bg:#fff7fb;--card:#ffffff;--text:#5b4b63;--sub:#9a8aa5;--line:#f3ddea;--ok:#59c38a;--soon:#ff6b81;--warn:#f6b73c;--muted:#c8b8cf;--shadow:0 12px 30px rgba(255,107,129,.12);--radius:28px}
    *{box-sizing:border-box} body{margin:0;font-family:"Nunito","Segoe UI",Roboto,"Noto Sans TC",sans-serif;background:linear-gradient(180deg,#fff7fb 0%,#fffdf7 100%);color:var(--text);padding:16px}
    .wrap{max-width:720px;margin:0 auto}.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:2px solid #ffe4ef;position:relative}
    .card::before{content:"🚌";position:absolute;right:16px;top:12px;font-size:1.4rem;opacity:.22}
    .header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:2px dashed #ffe4ef;background:linear-gradient(180deg,#fffafd 0%,#fff 100%)}
    .title{display:flex;flex-direction:column;gap:4px} h1{margin:0;font-size:1.5rem;line-height:1.2;font-weight:900;color:#ff6b81}.sub{color:var(--sub);font-size:.92rem}
    .refresh-btn{border:none;background:#fff0f6;color:#ff6b81;width:42px;height:42px;border-radius:999px;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 10px rgba(255,107,129,.12)}
    .list{width:100%}.row{display:grid;grid-template-columns:80px 1fr 88px;gap:10px;align-items:center;padding:16px 18px;border-bottom:1px dashed #f8dbe8}.row:last-child{border-bottom:none}
    .route{font-size:2rem;font-weight:900;line-height:1;color:#7c5cff}.dest{font-size:1.05rem;font-weight:700;color:#6b5c75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .eta{text-align:right;font-size:1.6rem;font-weight:800;color:var(--ok);white-space:nowrap}.eta.warn{color:var(--warn)}.eta.soon{color:var(--soon);font-size:1.35rem}.eta.muted{color:var(--muted);font-size:1rem;font-weight:700}
    .footer{padding:14px 18px 18px;text-align:center;color:var(--sub);font-size:.92rem;background:#fffafd}.loading,.empty,.error{padding:40px 20px;text-align:center;color:var(--sub);font-weight:700}.error{color:#dc2626}
    @media (max-width:480px){body{padding:10px}.row{grid-template-columns:68px 1fr 80px;padding:14px}.route{font-size:1.7rem}.dest{font-size:1rem}.eta{font-size:1.35rem}.eta.soon{font-size:1.1rem}h1{font-size:1.3rem}}
  </style>
</head>
<body>
  <div class="wrap"><div class="card">
    <div class="header"><div class="title"><h1>成福路口（去程）</h1><div class="sub">每 10 秒自動更新 · v1.0.0</div></div><button class="refresh-btn" id="refreshBtn">↻</button></div>
    <div id="list" class="list"><div class="loading">載入公車資料中…</div></div>
    <div class="footer" id="updatedAt">尚未更新</div>
  </div></div>

  <script>
    const listEl = document.getElementById('list');
    const updatedAtEl = document.getElementById('updatedAt');
    const refreshBtn = document.getElementById('refreshBtn');

    // NOTE:
    // Canvas sandbox / some browser previews block outbound fetch (CORS / network sandbox),
    // so we use mock fallback automatically when live fetch fails.
    const API_URL = 'https://pda5284.gov.taipei/MQS/StopDyna?stopid=24102';

    const ROUTE_DEST_MAP = {
      // 去程顯示「路線起點站」（你紅框左邊那欄）
      '257':'新莊聯合辦公大樓',
      '88區':'大直美堤花園',
      '藍10':'民生社區',
      '仁愛幹線':'五福新村',
      '286副':'行天宮',
      '286':'松山車站',
      '88':'大直美堤花園'
    };

    const MOCK_ROWS = [
      { route:'257', dest:'往新莊聯合辦公大樓', eta:'2分' },
      { route:'286', dest:'往松山車站', eta:'6分' },
      { route:'藍10', dest:'往民生社區', eta:'進站中' },
      { route:'88', dest:'往大直美堤花園', eta:'12分' }
    ];

    function formatETA(text){
      const raw = String(text || '').trim();
      if (!raw) return { text:'未提供', cls:'muted', sort:999999 };
      if (raw.includes('進站中') || raw.includes('即將')) return { text:'即將進站', cls:'soon', sort:0 };
      const m = raw.match(/(\d+)/);
      if (m) {
        const mins = parseInt(m[1], 10);
        return { text:`${mins} 分`, cls: mins <= 5 ? 'warn' : '', sort: mins * 60 };
      }
      return { text: raw, cls:'muted', sort:900000 };
    }

    function render(rows){
      if (!rows.length) { listEl.innerHTML = '<div class="empty">目前查無到站資料</div>'; return; }
      listEl.innerHTML = rows.map(item => `
        <div class="row">
          <div class="route">${item.route}</div>
          <div class="dest">${item.dest}</div>
          <div class="eta ${item.eta.cls}">${item.eta.text}</div>
        </div>`).join('');
    }

    function parseHTML(html){
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const rows = [...doc.querySelectorAll('tr')];
      return rows.map(tr => {
        const tds = tr.querySelectorAll('td');
        if (tds.length < 3) return null;
        const route = tds[0].textContent.trim();
        const etaText = tds[1].textContent.trim();
        const dest = `往${ROUTE_DEST_MAP[route] || '—'}`;
        return { route, dest, eta: formatETA(etaText) };
      }).filter(Boolean).sort((a,b)=>a.eta.sort-b.eta.sort);
    }

    function renderMock(){
      const rows = MOCK_ROWS.map(x => ({ route:x.route, dest:x.dest, eta:formatETA(x.eta) })).sort((a,b)=>a.eta.sort-b.eta.sort);
      render(rows);
      updatedAtEl.textContent = `展示模式 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}`;
    }

    async function fetchBus(){
      try {
        refreshBtn.disabled = true;
        listEl.innerHTML = '<div class="loading">更新中…</div>';
        const res = await fetch(API_URL, { cache:'no-store', mode:'cors' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();
        const rows = parseHTML(html);
        if (!rows.length) throw new Error('empty');
        render(rows);
        updatedAtEl.textContent = `更新時間 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}`;
      } catch (err) {
        console.warn('live fetch failed, fallback to mock:', err);
        renderMock();
      } finally {
        refreshBtn.disabled = false;
      }
    }

    // smoke tests
    console.assert(formatETA('進站中').text === '即將進站', 'test: 進站中');
    console.assert(formatETA('約3分').cls === 'warn', 'test: 3分 warn');
    console.assert(formatETA('').cls === 'muted', 'test: empty muted');
    console.assert(parseHTML('<table><tr><td>257</td><td>3分</td><td>南港花園社區</td></tr></table>').length === 1, 'test: parseHTML row');

    refreshBtn.addEventListener('click', fetchBus);
    fetchBus();
    setInterval(fetchBus, 10000);
  </script>
</body>
</html>
